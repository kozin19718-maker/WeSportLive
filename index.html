<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.E Sports - Live Match</title>
    <style>
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            display: flex;
            flex-direction: column;
            max-width: 800px;
            margin: 0 auto;
        }
        .video-player {
            width: 100%;
            height: 250px;
            background-color: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 2px solid #333;
        }
        .info-bar {
            display: flex;
            justify-content: space-between;
            padding: 10px 15px;
            background-color: #1e1e1e;
            border-bottom: 1px solid #333;
        }
        .live-viewers {
            color: #ff3b30;
            font-weight: bold;
        }
        .chat-container {
            height: 350px;
            display: flex;
            flex-direction: column;
            background-color: #181818;
        }
        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .message {
            background-color: #2a2a2a;
            padding: 8px 12px;
            border-radius: 8px;
            width: fit-content;
            max-width: 85%;
            word-wrap: break-word;
        }
        .message .user {
            color: #ffcc00;
            font-weight: bold;
            font-size: 0.9em;
            margin-bottom: 3px;
            display: block;
        }
        .chat-input-area {
            display: flex;
            padding: 10px;
            background-color: #1e1e1e;
            border-top: 1px solid #333;
        }
        .chat-input-area input {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 20px;
            background-color: #333;
            color: white;
            outline: none;
            padding-left: 15px;
        }
        .chat-input-area button {
            background-color: #ffcc00;
            color: #000;
            border: none;
            padding: 10px 20px;
            margin-left: 10px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="video-player">
        <span>[ Live Video Player Here ]</span>
    </div>

    <div class="info-bar">
        <span>🔥 လာမည့်ပွဲစဉ်များ Live</span>
        <span class="live-viewers">🔴 Live: <span id="viewer-count">0</span></span>
    </div>

    <div class="chat-container">
        <div class="chat-messages" id="chat-messages">
            </div>
        
        <div class="chat-input-area">
            <input type="text" id="msg-input" placeholder="ဒီမှာ မှတ်ချက်ရေးပါ..." onkeypress="handleKeyPress(event)">
            <button onclick="sendMessage()">ပို့မည်</button>
        </div>
    </div>
</div>

<script>
    const envKey = "3qg100m5ii0vu3s77t3773gp8";
    const chatBox = document.getElementById('chat-messages');
    const msgInput = document.getElementById('msg-input');
    const viewerCount = document.getElementById('viewer-count');

    // ၁။ Viewer Count အတု (Server ချိတ်ရင် အစစ်ပြောင်းထည့်ရန်)
    setInterval(() => {
        let currentViewers = Math.floor(Math.random() * (2500 - 2300 + 1)) + 2300; 
        viewerCount.innerText = currentViewers.toLocaleString();
    }, 3000);

    // ၂။ ကိုယ်ရေးလိုက်တဲ့စာကို Chat Box ထဲ ပေါ်အောင်လုပ်မယ့် Function
    function appendMessage(username, text) {
        const msgDiv = document.createElement('div');
        msgDiv.className = 'message';
        msgDiv.innerHTML = `<span class="user">${username}</span> ${text}`;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight; // အောက်ဆုံးကို အလိုအလျောက် ဆွဲချပေးရန်
    }

    // ၃။ ပို့မည် ခလုတ်နှိပ်ရင် အလုပ်လုပ်မယ့် Function
    function sendMessage() {
        const text = msgInput.value.trim();
        if (text === "") return;

        // ညီ့အနေနဲ့ ဒီနေရာမှာ Server ဆီကို Data လှမ်းပို့တဲ့ Code ရေးရပါမယ်။ 
        // ဥပမာ - socket.emit('chat_message', text);

        appendMessage("Guest User", text); // ကိုယ့်ဘက်မှာ အရင်ပေါ်အောင် ပြမယ်
        msgInput.value = ""; // စာရိုက်ပြီးရင် ဘောက်စ်ကို ရှင်းမယ်
    }

    // Enter ခေါက်ရင်ပါ စာပို့လို့ရအောင်
    function handleKeyPress(e) {
        if (e.key === 'Enter') {
            sendMessage();
        }
    }

    /* ၄။ တခြားသူတွေ ရေးတဲ့စာ ဝင်လာရင် ဖမ်းမယ့်နေရာ 
    ဒီနေရာမှာ ညီ့ရဲ့ Database / Server ကနေ ဝင်လာတဲ့ Data ကို ဖမ်းရပါမယ်။
    ဥပမာ - 
    socket.on('receive_message', function(data) {
        appendMessage(data.user, data.message);
    });
    */
</script>

</body>
</html>
