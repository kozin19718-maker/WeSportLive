    <script>
        // --- Configuration ---
        const LEAGUE_IDS = ['eng.1', 'uefa.champions', 'uefa.europa', 'esp.1', 'ita.1', 'ger.1', 'fra.1', 'tha.1', 'jpn.1', 'afc.champions'];
        let allMatches = [];
        let currentDate = 'all';
        let currentLeague = 'all';

        // --- 1. Dynamic FOMO Generator ---
        function generateFomoMessages() {
            const names = ['Ko Aung', 'Mg Mg', 'Ko Phyoe', 'U Hla', 'Zaw Gyi', 'Sai Sai', 'Myo Min', 'Ko Kyaw'];
            const amounts = ['300,000', '500,000', '1,200,000', '800,000', '150,000', '2,000,000'];
            const games = ['Man Utd vs Liv', 'Shan United', 'Baccarat', 'Slots', 'Mix Parlay'];
            
            let html = '';
            // Generate 10 random winning messages
            for(let i=0; i<10; i++) {
                const n = names[Math.floor(Math.random() * names.length)];
                const a = amounts[Math.floor(Math.random() * amounts.length)];
                const g = games[Math.floor(Math.random() * games.length)];
                html += `<span class="mx-6 text-yellow-300">🎉 <b>${n}</b> just won <b class="text-white">${a} Ks</b> on ${g}!</span>`;
            }
            document.getElementById('fomo-text').innerHTML = html;
        }
        setInterval(generateFomoMessages, 30000); // Refresh every 30s
        generateFomoMessages(); // Init

        // --- 2. Data Fetching (Robust) ---
        async function fetchMatches(manual = false) {
            const container = document.getElementById('matches-container');
            if(manual) container.innerHTML = `<div class="text-center py-10"><i class="fas fa-circle-notch animate-spin text-green-500 text-3xl"></i></div>`;

            try {
                const promises = LEAGUE_IDS.map(id => 
                    fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${id}/scoreboard`)
                        .then(res => res.ok ? res.json() : null)
                        .catch(e => null)
                );
                
                const results = await Promise.all(promises);
                let live = [], upcoming = [], finished = [];

                results.forEach(data => {
                    if (!data || !data.events) return;
                    const leagueName = data.leagues[0]?.abbreviation || 'CUP';
                    const leagueSlug = data.leagues[0]?.slug;
                    const leagueId = data.leagues[0]?.id;

                    data.events.forEach(ev => {
                        const comp = ev.competitions[0];
                        const home = comp.competitors.find(c => c.homeAway === 'home');
                        const away = comp.competitors.find(c => c.homeAway === 'away');
                        const isUtd = (home.team.name + away.team.name).includes('Manchester United');
                        
                        const match = {
                            id: ev.id, league: leagueName, leagueSlug: leagueSlug, leagueId: leagueId,
                            date: new Date(ev.date),
                            status: ev.status.type.state, // pre, in, post
                            clock: ev.status.type.shortDetail,
                            home: { name: home.team.name, score: home.score || 0, logo: home.team.logo },
                            away: { name: away.team.name, score: away.score || 0, logo: away.team.logo },
                            isUtd: isUtd
                        };

                        if (match.status === 'in') live.push(match);
                        else if (match.status === 'pre') upcoming.push(match);
                        else finished.push(match);
                    });
                });

                const sortFn = (a, b) => (b.isUtd - a.isUtd) || (a.date - b.date);
                live.sort(sortFn); upcoming.sort(sortFn); finished.sort((a, b) => (b.date - a.date));
                allMatches = [...live, ...upcoming, ...finished];
                renderMatches();

            } catch (err) {
                console.error(err);
                if(manual) container.innerHTML = `<div class="text-center text-red-500 py-10">Connection Error. Please try again.</div>`;
            }
        }

        // --- 3. Render Matches (With Banners & Static Odds) ---
        function renderMatches() {
            const container = document.getElementById('matches-container');
            const dateContainer = document.getElementById('date-selector');
            
            // Filter
            let filtered = allMatches.filter(m => {
                const matchDate = m.date.toISOString().split('T')[0];
                return (currentLeague === 'all' || m.leagueSlug === currentLeague) &&
                       (currentDate === 'all' || matchDate === currentDate);
            });

            // Date Selector
            const dates = [...new Set(allMatches.map(m => m.date.toISOString().split('T')[0]))].sort();
            dateContainer.innerHTML = `<button onclick="currentDate='all'; renderMatches()" class="${currentDate === 'all' ? 'bg-slate-800 text-white dark:bg-white dark:text-black' : 'bg-white dark:bg-white/10'} px-3 py-1.5 rounded-lg text-[10px] font-black shadow border border-transparent transition-all">Today</button>` + 
                dates.map(d => `<button onclick="currentDate='${d}'; renderMatches()" class="${currentDate === d ? 'bg-slate-800 text-white dark:bg-white dark:text-black' : 'bg-white dark:bg-white/10'} px-3 py-1.5 rounded-lg text-[10px] font-bold shadow border border-transparent transition-all">${d.slice(5)}</button>`).join('');

            if (filtered.length === 0) {
                container.innerHTML = `<div class="flex flex-col items-center justify-center py-10 opacity-50"><i class="fas fa-futbol text-4xl mb-2"></i><span class="text-xs font-bold">No Matches Found</span></div>`;
                return;
            }

            // Loop with Banner Injection
            let htmlContent = '';
            filtered.forEach((m, index) => {
                const isLive = m.status === 'in';
                const timeStr = m.date.toLocaleTimeString('en-US', {hour:'2-digit', minute:'2-digit', hour12:true});
                
                // Match Card
                htmlContent += `
                <div class="match-card ${m.isUtd ? 'border-red-500/50 bg-red-50/50 dark:bg-red-900/10' : ''} p-4 relative cursor-pointer active:scale-95 transition-transform duration-200" onclick="openStats('${m.id}', '${m.leagueId}')">
                    ${m.isUtd ? '<div class="absolute -top-2 -right-2 bg-red-600 text-white text-[8px] px-2 py-1 rounded-full font-black z-10 shadow-sm animate-bounce">RED ARMY</div>' : ''}
                    
                    <div class="flex justify-between items-center mb-3">
                         <div class="flex items-center gap-1">
                            <span class="text-[9px] font-black text-slate-500 bg-slate-100 dark:bg-white/10 px-2 py-0.5 rounded uppercase">${m.league}</span>
                            ${isLive ? '<span class="text-[8px] bg-red-500 text-white px-1.5 py-0.5 rounded font-bold animate-pulse">LIVE</span>' : ''}
                         </div>
                         <span class="text-[10px] font-bold ${isLive ? 'text-red-500' : 'text-slate-400'}">${isLive ? m.clock : (m.status === 'post' ? 'FT' : timeStr)}</span>
                    </div>

                    <div class="flex items-center justify-between mb-3">
                        <div class="flex-1 flex flex-col items-center gap-1">
                            <img src="${m.home.logo}" class="w-10 h-10 object-contain drop-shadow-sm">
                            <span class="text-[10px] font-bold text-center leading-tight dark:text-slate-200">${m.home.name}</span>
                        </div>
                        <div class="px-3">
                            <div class="text-xl font-black text-slate-800 dark:text-white bg-slate-100 dark:bg-black/30 px-3 py-1 rounded-lg tracking-tighter">
                                ${m.status === 'pre' ? 'VS' : `${m.home.score}-${m.away.score}`}
                            </div>
                        </div>
                        <div class="flex-1 flex flex-col items-center gap-1">
                            <img src="${m.away.logo}" class="w-10 h-10 object-contain drop-shadow-sm">
                            <span class="text-[10px] font-bold text-center leading-tight dark:text-slate-200">${m.away.name}</span>
                        </div>
                    </div>

                    <div class="border-t border-slate-100 dark:border-white/5 pt-2 flex justify-between items-center" onclick="event.stopPropagation(); window.open('https://reffpa.com/L?tag=d_5044643m_97c_&site=5044643&ad=97&r=registration')">
                        <div class="text-[9px] text-slate-400 font-bold">1XBET ODDS:</div>
                        <div class="flex gap-1">
                            <div class="bg-slate-50 dark:bg-white/5 px-2 py-1 rounded text-[10px] font-bold text-slate-500">1.95</div>
                            <div class="bg-slate-50 dark:bg-white/5 px-2 py-1 rounded text-[10px] font-bold text-slate-500">3.40</div>
                            <div class="bg-green-100 dark:bg-green-900/20 px-2 py-1 rounded text-[10px] font-bold text-green-600 dark:text-green-400 border border-green-500/30">Bet Now</div>
                        </div>
                    </div>
                </div>`;

                // Inject Banner every 4 matches to break clutter
                if ((index + 1) % 4 === 0) {
                    htmlContent += `
                    <div class="bg-gradient-to-r from-yellow-500 to-yellow-600 rounded-xl p-3 flex justify-between items-center shadow-lg relative overflow-hidden group my-2">
                        <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-20 transition"></div>
                        <div class="text-black relative z-10">
                            <div class="text-[10px] font-black uppercase opacity-70">Don't Miss Out</div>
                            <div class="text-sm font-black italic">ဒီအပတ် ပွဲကြီးတွေများတယ်!</div>
                        </div>
                        <a href="https://t.me/WinExpress99" target="_blank" class="bg-black text-white px-3 py-1.5 rounded-lg text-[10px] font-bold shadow">ငွေသွင်းမည်</a>
                    </div>`;
                }
            });
            container.innerHTML = htmlContent;
        }

        // --- 4. Standings Fetcher ---
        async function fetchStandings(leagueId = 'eng.1') {
            const tbody = document.getElementById('standings-body');
            const loader = document.getElementById('standings-loading');
            
            tbody.innerHTML = '';
            loader.classList.remove('hidden');

            try {
                // Note: Using a reliable ESPN endpoint structure
                const res = await fetch(`https://site.api.espn.com/apis/v2/sports/soccer/${leagueId}/standings`);
                const data = await res.json();
                
                loader.classList.add('hidden');
                
                if (!data.children || !data.children[0] || !data.children[0].standings) {
                    tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-slate-400">No Data Available</td></tr>`;
                    return;
                }

                const entries = data.children[0].standings.entries;
                
                tbody.innerHTML = entries.map((entry, idx) => {
                    const stats = entry.stats;
                    // Helper to find stat by name (robust)
                    const getStat = (name) => stats.find(s => s.name === name)?.value || 0;
                    
                    const played = getStat('gamesPlayed');
                    const gd = getStat('pointDifferential');
                    const points = getStat('points');
                    
                    // Top 4 styling
                    let posColor = 'text-slate-500';
                    if(idx < 4) posColor = 'text-blue-500 font-black';
                    if(idx > entries.length - 4) posColor = 'text-red-500';

                    return `
                    <tr class="border-b border-slate-100 dark:border-white/5 hover:bg-slate-50 dark:hover:bg-white/5 transition">
                        <td class="py-3 pl-1 ${posColor} text-[10px]">${idx + 1}</td>
                        <td class="py-3 flex items-center gap-2">
                            <img src="${entry.team.logos[0].href}" class="w-5 h-5 object-contain">
                            <span class="truncate w-24">${entry.team.shortDisplayName}</span>
                        </td>
                        <td class="py-3 text-center text-slate-500">${played}</td>
                        <td class="py-3 text-center text-slate-500">${gd > 0 ? '+'+gd : gd}</td>
                        <td class="py-3 text-center font-black text-black dark:text-white">${points}</td>
                    </tr>`;
                }).join('');

            } catch (e) {
                console.error(e);
                loader.classList.add('hidden');
                tbody.innerHTML = `<tr><td colspan="5" class="text-center py-4 text-red-400 text-[10px]">Failed to load standings</td></tr>`;
            }
        }

        // --- 5. Navigation & UI Logic ---
        function switchTab(tab) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`tab-${tab}`).classList.remove('hidden');
            
            document.querySelectorAll('.nav-btn').forEach(el => {
                el.classList.remove('bg-blue-600', 'text-white', 'shadow-md');
                el.classList.add('bg-slate-100', 'dark:bg-white/10', 'text-slate-500', 'dark:text-slate-400');
            });
            const activeBtn = document.getElementById(`nav-${tab}`);
            activeBtn.classList.remove('bg-slate-100', 'dark:bg-white/10', 'text-slate-500', 'dark:text-slate-400');
            activeBtn.classList.add('bg-blue-600', 'text-white', 'shadow-md');

            if(tab === 'standings') fetchStandings(); // Initial fetch
        }

        function filterLeague(slug) {
            currentLeague = slug;
            document.querySelectorAll('.league-chip').forEach(el => {
                el.className = 'league-chip px-4 py-1.5 rounded-full text-[11px] font-bold bg-slate-200 dark:bg-white/10 text-slate-600 dark:text-slate-400 transition-all whitespace-nowrap';
            });
            const activeBtn = document.querySelector(`button[onclick="filterLeague('${slug}')"]`);
            if(activeBtn) activeBtn.className = 'league-chip active px-4 py-1.5 rounded-full text-[11px] font-bold bg-slate-800 dark:bg-white text-white dark:text-black shadow transition-all whitespace-nowrap';
            renderMatches();
        }

        // Stats Modal Logic
        async function openStats(eventId, leagueId) {
            const modal = document.getElementById('stats-modal');
            const body = document.getElementById('stats-body-container');
            modal.classList.remove('hidden');
            setTimeout(() => { modal.classList.remove('opacity-0'); document.getElementById('stats-content').classList.remove('translate-y-full'); }, 10);
            
            body.innerHTML = `<div class="text-center py-10"><i class="fas fa-circle-notch animate-spin text-green-500 text-2xl"></i></div>`;
            
            try {
                const res = await fetch(`https://site.api.espn.com/apis/site/v2/sports/soccer/${leagueId || 'eng.1'}/summary?event=${eventId}`);
                const data = await res.json();
                
                if(!data.boxscore) throw new Error("No Stats");
                const t1 = data.boxscore.teams[0];
                const t2 = data.boxscore.teams[1];
                const stats = t1.statistics || [];
                
                const statRows = [
                    {k:'possessionPct', l:'Possession %'}, {k:'shots', l:'Total Shots'}, 
                    {k:'shotsOnTarget', l:'On Target'}, {k:'cornerKicks', l:'Corners'}, 
                    {k:'foulsCommitted', l:'Fouls'}, {k:'yellowCards', l:'Yellow Cards', c:'text-yellow-500'}, 
                    {k:'redCards', l:'Red Cards', c:'text-red-600 font-black'}
                ];

                const statsHtml = stats.length ? statRows.map(i => {
                    const v1 = t1.statistics.find(s => s.name === i.k)?.displayValue || 0;
                    const v2 = t2.statistics.find(s => s.name === i.k)?.displayValue || 0;
                    const p1 = parseFloat(v1)||0, p2 = parseFloat(v2)||0, t = p1+p2||1;
                    return `
                    <div class="mb-3">
                        <div class="flex justify-between text-[10px] font-bold mb-1 dark:text-slate-300">
                            <span>${v1}</span> <span class="${i.c || 'text-slate-400'} uppercase tracking-wide">${i.l}</span> <span>${v2}</span>
                        </div>
                        <div class="flex h-1.5 bg-slate-100 dark:bg-white/10 rounded-full overflow-hidden">
                            <div class="bg-blue-600 h-full" style="width:${i.k==='possessionPct'?p1:(p1/t)*100}%"></div>
                            <div class="bg-red-500 h-full" style="width:${i.k==='possessionPct'?p2:(p2/t)*100}%"></div>
                        </div>
                    </div>`;
                }).join('') : '<div class="text-center text-xs text-slate-400">Stats not available for this match</div>';

                body.innerHTML = `
                    <div class="flex justify-between items-center mb-6 px-2">
                        <div class="flex flex-col items-center"><img src="${t1.team.logo}" class="w-12 h-12 object-contain mb-2"><span class="text-[10px] font-black dark:text-white text-center leading-none">${t1.team.abbreviation}</span></div>
                        <div class="text-3xl font-black dark:text-white tracking-tighter">${t1.score||0} - ${t2.score||0}</div>
                        <div class="flex flex-col items-center"><img src="${t2.team.logo}" class="w-12 h-12 object-contain mb-2"><span class="text-[10px] font-black dark:text-white text-center leading-none">${t2.team.abbreviation}</span></div>
                    </div>
                    <div class="bg-slate-50 dark:bg-black/20 rounded-xl p-4 border border-slate-100 dark:border-white/5">${statsHtml}</div>
                `;
            } catch(e) {
                body.innerHTML = `<div class="text-center text-xs text-slate-400 py-10">Data not available</div>`;
            }
        }

        function closeStatsModal() {
            const modal = document.getElementById('stats-modal');
            modal.classList.add('opacity-0');
            document.getElementById('stats-content').classList.add('translate-y-full');
            setTimeout(() => modal.classList.add('hidden'), 300);
        }

        function copyPromo() {
            navigator.clipboard.writeText('ZINXBET');
            alert('Promo Code ZINXBET Copied!');
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
            const isDark = document.documentElement.classList.contains('dark');
            document.getElementById('theme-icon').className = isDark ? 'fas fa-sun' : 'fas fa-moon';
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
        }

        // Init
        if(localStorage.getItem('theme') === 'dark' || (!localStorage.getItem('theme') && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
            document.documentElement.classList.add('dark');
            document.getElementById('theme-icon').className = 'fas fa-sun';
        }
        fetchMatches();
        setInterval(() => fetchMatches(), 60000); // Auto Refresh Matches
    </script>
</body>
</html>
